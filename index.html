<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" integrity="sha512-KfkfwYDsLkIlwQp6LFnl8zNdLGxu9YAA1QvwINks4PhcElQSvqcyVLLD9aMhXd13uQjoXtEKNosOWaZqXgel0g==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Profile-card</title>
</head>
<body>

    <div class="card">

        <div class="main-content">
            <div class="image">
                <img src="profile-picture.jpg" alt="profile-image">
            </div>
            <h2>Iman Mostafavi</h1>
            <h3>Front-end developer <i class="fa-solid fa-laptop-code"></i></h3>
        </div>

        <div class="skills">
            <h4>Skills :</h4>
            <ul>
                <li>Html</li>
                <li>Css</li>
                <li>Javascript</li>
                <li>Github</li>
                <li>React</li>
            </ul>
        </div>

        <ul class="social-links">
            <li><i class="fa-brands fa-github-square"></i></li>
            <li><i class="fa-brands fa-instagram-square"></i></li>
            <li><i class="fa-brands fa-twitter-square"></i></li>
            <li><i class="fa-brands fa-telegram"></i></li>
        </ul>
        
    </div>

</body>
</html>
